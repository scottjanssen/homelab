version: "3.0"
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "container:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8097
      - TORRENTING_PORT=6881
    volumes:
      - ./config:/config
      - /mnt/media:/data
    restart: unless-stopped